<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Quantum Casino</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap');
:root {
  --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
  --border: rgba(140,120,255,0.18); --accent: #8c78ff; --accent2: #3de8c8;
  --accent3: #ff6b8a; --text: #e8e4ff; --muted: #7a759e;
  --win: #3de8c8; --loss: #ff6b8a;
  --mono: 'Space Mono', monospace; --sans: 'Syne', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text); font-family: var(--sans);
  min-height: 100vh; padding: 2rem 1rem;
  background-image:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(140,120,255,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 80% 80%, rgba(61,232,200,0.06) 0%, transparent 60%);
}
h1 { font-size: clamp(2rem,5vw,3.2rem); font-weight: 800; letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.subtitle { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); letter-spacing: 0.12em; margin-top: 4px; }
.container { max-width: 900px; margin: 0 auto; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
@media (max-width: 600px) { .grid2 { grid-template-columns: 1fr; } }
</style></head>
<body><div class="container">
<div style="margin-bottom:2rem"><h1>&#x2697; Quantum Casino</h1>
<p class="subtitle">// SIMULATING QISKIT CIRCUITS IN THE BROWSER</p></div>

<style>
.tabs { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 1.5rem; }
.tab { flex: 1; padding: 0.65rem 0.5rem; font-family: var(--sans); font-size: 0.82rem; font-weight: 600;
  background: transparent; border: none; color: var(--muted); cursor: pointer;
  border-right: 1px solid var(--border); transition: all 0.2s; text-align: center; }
.tab:last-child { border-right: none; }
.tab.active { background: var(--accent); color: #fff; }
.tab:hover:not(.active) { background: var(--surface2); color: var(--text); }
.coin-wrap { display: flex; justify-content: center; margin: 1.5rem 0; perspective: 400px; }
.coin { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--accent);
  display: flex; align-items: center; justify-content: center; font-size: 2.8rem;
  background: radial-gradient(circle at 35% 35%, var(--surface2), var(--bg));
  box-shadow: 0 0 24px rgba(140,120,255,0.25), inset 0 0 12px rgba(140,120,255,0.1);
  transition: transform 0.15s, border-color 0.3s, box-shadow 0.3s; cursor: default; }
.coin.superposition { border-color: var(--accent2); box-shadow: 0 0 32px rgba(61,232,200,0.35), inset 0 0 16px rgba(61,232,200,0.1); animation: pulse-super 1.4s ease-in-out infinite; }
@keyframes pulse-super { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
@keyframes spin { 0%{transform:rotateY(0)} 50%{transform:rotateY(360deg)} 100%{transform:rotateY(720deg)} }
.coin.spinning { animation: spin 0.6s ease-in-out; }
.circuit { font-family: var(--mono); font-size: 0.78rem; color: var(--muted);
  background: var(--surface2); border-radius: 10px; padding: 0.9rem 1.1rem;
  border-left: 3px solid var(--accent); margin-bottom: 1rem; line-height: 1.9; }
.gate { display: inline-block; padding: 1px 7px; border-radius: 5px; font-weight: 700; font-size: 0.75rem; }
.gate-h { background: #2a1f5a; color: var(--accent); border: 1px solid rgba(140,120,255,0.4); }
.gate-x { background: #1a2d2a; color: var(--accent2); border: 1px solid rgba(61,232,200,0.4); }
.gate-z { background: #2d1a22; color: var(--accent3); border: 1px solid rgba(255,107,138,0.4); }
.gate-cx { background: #2d2a1a; color: #f0c040; border: 1px solid rgba(240,192,64,0.4); }
.gate-m { background: #1a2a2a; color: #6af; border: 1px solid rgba(102,170,255,0.4); }
.pred-row { display: flex; gap: 0.75rem; margin-bottom: 1rem; }
.pred-btn { flex: 1; padding: 0.65rem; border-radius: 10px; font-family: var(--sans); font-weight: 600;
  font-size: 0.9rem; cursor: pointer; border: 1.5px solid var(--border);
  background: transparent; color: var(--muted); transition: all 0.2s; }
.pred-btn:hover { border-color: var(--accent); color: var(--text); }
.pred-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(140,120,255,0.1); }
.flip-btn { width: 100%; padding: 0.9rem; border-radius: 12px; font-family: var(--sans);
  font-size: 1rem; font-weight: 700; cursor: pointer; border: 2px solid var(--accent);
  background: rgba(140,120,255,0.12); color: var(--accent); letter-spacing: 0.04em; transition: all 0.2s; }
.flip-btn:hover:not(:disabled) { background: var(--accent); color: #fff; box-shadow: 0 0 20px rgba(140,120,255,0.4); }
.flip-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.stat-card { background: var(--surface2); border-radius: 10px; padding: 0.85rem 1rem; text-align: center; }
.stat-label { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 5px; }
.stat-val { font-size: 1.6rem; font-weight: 800; color: var(--text); }
.bar-row { margin-bottom: 0.6rem; }
.bar-meta { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 0.72rem; color: var(--muted); margin-bottom: 4px; }
.bar-track { height: 7px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }
.result-msg { text-align: center; font-family: var(--mono); font-size: 0.82rem; min-height: 1.2rem; margin: 0.4rem 0 0.8rem; transition: color 0.3s; }
.mode-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.6; margin-bottom: 1rem; }
.mode-desc strong { color: var(--text); }
.log-box { max-height: 90px; overflow-y: auto; border-top: 1px solid var(--border); padding-top: 0.6rem; margin-top: 1rem; }
.log-entry { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); padding: 2px 0; }
.log-entry.hit { color: var(--win); } .log-entry.miss { color: var(--loss); }
.ent-pair { display: flex; align-items: center; justify-content: center; gap: 1.5rem; margin: 1rem 0; }
.ent-qubit { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--accent3);
  display: flex; align-items: center; justify-content: center; font-size: 1.6rem;
  background: radial-gradient(circle, var(--surface2), var(--bg)); }
.ent-link { font-family: var(--mono); font-size: 0.75rem; color: var(--accent3); text-align: center; }
.section-title { font-size: 0.7rem; font-family: var(--mono); color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.5rem; }
.log-box::-webkit-scrollbar { width: 4px; }
.log-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>

<div class="tabs">
  <button class="tab active" onclick="setMode('super')">Superposition</button>
  <button class="tab" onclick="setMode('phase')">Phase (Z Gate)</button>
  <button class="tab" onclick="setMode('entangle')">Entanglement</button>
  <button class="tab" onclick="setMode('composite')">Composite</button>
</div>
<div class="grid2" style="align-items:start">
  <div class="card">
    <div id="mode-desc" class="mode-desc"></div>
    <div id="circuit-display" class="circuit"></div>
    <div id="coin-area"></div>
    <div id="result-msg" class="result-msg"></div>
    <div id="predict-area" class="pred-row"></div>
    <button class="flip-btn" id="flip-btn" disabled onclick="runCircuit()">Pick a side to measure</button>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.6rem;margin-top:1rem">
      <div class="stat-card"><div class="stat-label">shots</div><div class="stat-val" id="s-shots">0</div></div>
      <div class="stat-card"><div class="stat-label">score</div><div class="stat-val" id="s-score" style="color:var(--win)">0</div></div>
      <div class="stat-card"><div class="stat-label">hit rate</div><div class="stat-val" id="s-acc">&#8212;</div></div>
    </div>
    <div class="log-box" id="log"></div>
  </div>
  <div style="display:flex;flex-direction:column;gap:1rem">
    <div class="card"><div class="section-title">measurement histogram</div><div id="histogram"></div></div>
    <div class="card"><div class="section-title">quantum concept</div><div id="theory-box" style="font-size:0.82rem;color:var(--muted);line-height:1.7"></div></div>
    <div class="card">
      <div class="section-title">convergence (shots vs P)</div>
      <canvas id="conv-canvas" width="300" height="100" style="width:100%;border-radius:8px"></canvas>
      <div style="font-family:var(--mono);font-size:0.65rem;color:var(--muted);margin-top:6px">P(|0&#x27E9;) over last 20 shots &#8212; should approach 0.50</div>
    </div>
  </div>
</div>
</div>

<script>
let mode='super',prediction=null,shots=0,score=0,counts={},history=[],pending=false;
const MODES={
  super:{label:'Superposition — H Gate',
    circuit:()=>`|0&#x27E9; &#8211;&#8211;[<span class="gate gate-h">H</span>]&#8211;&#8211;[<span class="gate gate-m">M</span>]&#8211;&#8211;<br><span style="color:var(--muted)">// H|0&#x27E9; = (|0&#x27E9;+|1&#x27E9;)/&#x221A;2 &rarr; P(0)=0.5, P(1)=0.5</span>`,
    outcomes:['0','1'],probs:[0.5,0.5],predict:['&#127820; Heads |0&#x27E9;','&#128302; Tails |1&#x27E9;'],
    desc:`<strong>Hadamard gate</strong> creates equal superposition. The qubit exists as both |0&#x27E9; and |1&#x27E9; simultaneously until measured.`,
    theory:`The H gate transforms the basis state:<br><br><code style="font-family:var(--mono);color:var(--accent)">H|0&#x27E9; = (|0&#x27E9; + |1&#x27E9;) / &#x221A;2 = |+&#x27E9;</code><br><br>This is the <em>|+&#x27E9;</em> state &#8212; 50% probability of measuring either outcome. No strategy can beat chance here. This is <strong>true randomness</strong>, unlike classical pseudo-random numbers.`,
    coins:['&#127820;','&#128302;']},
  phase:{label:'Phase Kickback — Z Gate',
    circuit:()=>`|0&#x27E9; &#8211;&#8211;[<span class="gate gate-h">H</span>]&#8211;&#8211;[<span class="gate gate-z">Z</span>]&#8211;&#8211;[<span class="gate gate-h">H</span>]&#8211;&#8211;[<span class="gate gate-m">M</span>]&#8211;&#8211;<br><span style="color:var(--muted)">// H&#xB7;Z&#xB7;H|0&#x27E9; = X|0&#x27E9; = |1&#x27E9; &rarr; P(1)&#x2248;1.0</span>`,
    outcomes:['0','1'],probs:[0.05,0.95],predict:['|0&#x27E9; (wrong!)','|1&#x27E9; (correct)'],
    desc:`<strong>Phase gate (Z)</strong> flips phase in superposition. Sandwiched between two H gates, it becomes an X (NOT) gate &#8212; the qubit is deterministically |1&#x27E9;.`,
    theory:`Z gate applies a phase flip: Z|1&#x27E9; = -|1&#x27E9;. Invisible alone, but in superposition it becomes observable:<br><br><code style="font-family:var(--mono);color:var(--accent)">H&#xB7;Z&#xB7;H = X (Pauli-X / NOT gate)</code><br><br>This is <strong>phase kickback</strong> &#8212; the phase encoded in superposition changes the measurement basis. The qubit should almost always collapse to <strong>|1&#x27E9;</strong>.`,
    coins:['&#10060;','&#9989;']},
  entangle:{label:'Entanglement — Bell State',
    circuit:()=>`q0: |0&#x27E9; &#8211;&#8211;[<span class="gate gate-h">H</span>]&#8211;&#8211;&#x25CF;&#8211;&#8211;[<span class="gate gate-m">M</span>]&#8211;&#8211;<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;|<br>q1: |0&#x27E9; &#8211;&#8211;&#8211;&#8211;&#8211;&#8211;&#8211;[<span class="gate gate-cx">CX</span>]&#8211;&#8211;[<span class="gate gate-m">M</span>]&#8211;&#8211;<br><span style="color:var(--muted)">// |&#x3A6;+&#x27E9; = (|00&#x27E9;+|11&#x27E9;)/&#x221A;2 &rarr; P(00)=P(11)=0.5</span>`,
    outcomes:['00','11','01','10'],probs:[0.5,0.5,0,0],predict:['|00&#x27E9; both 0','|11&#x27E9; both 1'],
    desc:`<strong>CNOT gate</strong> entangles two qubits into the Bell state |&#x3A6;+&#x27E9;. Measuring one instantly determines the other &#8212; only |00&#x27E9; or |11&#x27E9; can occur.`,
    theory:`The Bell state is created by H + CNOT:<br><br><code style="font-family:var(--mono);color:var(--accent)">|&#x3A6;+&#x27E9; = (|00&#x27E9; + |11&#x27E9;) / &#x221A;2</code><br><br>Outcomes |01&#x27E9; and |10&#x27E9; are <strong>forbidden</strong> &#8212; probability exactly 0. The qubits are correlated no matter how far apart. This is Einstein's "spooky action at a distance."`,
    coins:['&#128309;&#128309;','&#128308;&#128308;']},
  composite:{label:'Composite — H + X Gate',
    circuit:()=>`|0&#x27E9; &#8211;&#8211;[<span class="gate gate-h">H</span>]&#8211;&#8211;[<span class="gate gate-x">X</span>]&#8211;&#8211;[<span class="gate gate-m">M</span>]&#8211;&#8211;<br><span style="color:var(--muted)">// X|+&#x27E9; = |+&#x27E9; &rarr; still 50/50! Gate order matters.</span>`,
    outcomes:['0','1'],probs:[0.5,0.5],predict:['|0&#x27E9; Heads','|1&#x27E9; Tails'],
    desc:`<strong>H then X</strong> still gives superposition! X|+&#x27E9; = |+&#x27E9; &#8212; the X gate preserves the |+&#x27E9; state. But X then H gives |&#x2212;&#x27E9;, different phase, same statistics.`,
    theory:`Gate order matters:<br><br><code style="font-family:var(--mono);color:var(--accent)">H&#xB7;X|0&#x27E9; = H|1&#x27E9; = |&#x2212;&#x27E9;</code><br><code style="font-family:var(--mono);color:var(--accent)">X&#xB7;H|0&#x27E9; = X|+&#x27E9; = |+&#x27E9;</code><br><br>Both give 50/50 measurement stats, but they are <strong>different quantum states</strong>. |+&#x27E9; and |&#x2212;&#x27E9; differ by a phase of &#x3C0; &#8212; invisible to measurement but detectable via interference.`,
    coins:['&#127820;','&#128302;']}
};
</script>

<script>
function setMode(m){
  mode=m; prediction=null; shots=0; score=0; counts={}; history=[];
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['super','phase','entangle','composite'][i]===m);
  });
  renderMode(); updateStats(); renderHistogram(); drawConvergence();
}
function renderMode(){
  const cfg=MODES[mode];
  document.getElementById('mode-desc').innerHTML=cfg.desc;
  document.getElementById('circuit-display').innerHTML=cfg.circuit();
  document.getElementById('theory-box').innerHTML=cfg.theory;
  let coinHtml='';
  if(mode==='entangle'){
    coinHtml=`<div class="ent-pair"><div class="ent-qubit" id="q0">&#10067;</div><div class="ent-link" id="ent-link">&#x2B21;<br>entangled</div><div class="ent-qubit" id="q1">&#10067;</div></div>`;
  } else {
    coinHtml=`<div class="coin-wrap"><div class="coin superposition" id="main-coin">&#10067;</div></div>`;
  }
  document.getElementById('coin-area').innerHTML=coinHtml;
  const preds=cfg.predict;
  document.getElementById('predict-area').innerHTML=preds.slice(0,2).map((p,i)=>
    `<button class="pred-btn" id="pred-${i}" onclick="setPrediction(${i})">${p}</button>`).join('');
  document.getElementById('result-msg').textContent='';
  const btn=document.getElementById('flip-btn');
  btn.disabled=true; btn.textContent='Pick a side to measure';
}
function setPrediction(v){
  prediction=v;
  document.querySelectorAll('.pred-btn').forEach((b,i)=>b.classList.toggle('selected',i===v));
  const btn=document.getElementById('flip-btn');
  btn.disabled=false; btn.textContent='Collapse the wave function \u2193';
}
function sampleOutcome(){
  const cfg=MODES[mode]; const r=Math.random(); let cum=0;
  for(let i=0;i<cfg.outcomes.length;i++){cum+=cfg.probs[i];if(r<cum)return cfg.outcomes[i];}
  return cfg.outcomes[cfg.outcomes.length-1];
}
function runCircuit(){
  if(prediction===null||pending)return;
  pending=true;
  const btn=document.getElementById('flip-btn');
  btn.disabled=true; btn.textContent='Measuring\u2026';
  const cfg=MODES[mode];
  if(mode==='entangle'){
    document.getElementById('q0').textContent='\uD83C\uDF00';
    document.getElementById('q1').textContent='\uD83C\uDF00';
    document.getElementById('ent-link').style.color='var(--accent)';
  } else {
    const coin=document.getElementById('main-coin');
    coin.classList.remove('superposition'); coin.classList.add('spinning');
  }
  setTimeout(()=>{
    const result=sampleOutcome();
    const predOutcome=cfg.outcomes[prediction];
    const hit=result===predOutcome;
    if(hit)score++; shots++;
    counts[result]=(counts[result]||0)+1;
    const key0=cfg.outcomes[0];
    const total=Object.values(counts).reduce((a,b)=>a+b,0);
    history.push((counts[key0]||0)/total);
    if(history.length>20)history.shift();
    if(mode==='entangle'){
      const bits=result.split('');
      document.getElementById('q0').textContent=bits[0]==='0'?'\uD83D\uDD35':'\uD83D\uDD34';
      document.getElementById('q1').textContent=bits[1]==='0'?'\uD83D\uDD35':'\uD83D\uDD34';
      document.getElementById('ent-link').style.color=hit?'var(--win)':'var(--loss)';
    } else {
      const coin=document.getElementById('main-coin');
      coin.classList.remove('spinning');
      const idx=cfg.outcomes.indexOf(result);
      coin.textContent=cfg.coins[idx]||cfg.coins[0];
      coin.style.borderColor=hit?'var(--win)':'var(--loss)';
      coin.style.boxShadow=hit?'0 0 28px rgba(61,232,200,0.4)':'0 0 28px rgba(255,107,138,0.4)';
      setTimeout(()=>{coin.style.borderColor='';coin.style.boxShadow='';coin.classList.add('superposition');coin.textContent='&#10067;';},1200);
    }
    const rm=document.getElementById('result-msg');
    rm.textContent=`|${result}\u27E9 measured \u2014 ${hit?'\u2713 correct!':'\u2717 wrong'}`;
    rm.style.color=hit?'var(--win)':'var(--loss)';
    addLog(result,predOutcome,hit,shots);
    updateStats(); renderHistogram(); drawConvergence();
    prediction=null;
    document.querySelectorAll('.pred-btn').forEach(b=>b.classList.remove('selected'));
    btn.disabled=false; btn.textContent='Pick a side to measure'; pending=false;
  },650);
}
function updateStats(){
  document.getElementById('s-shots').textContent=shots;
  document.getElementById('s-score').textContent=score;
  document.getElementById('s-acc').textContent=shots>0?Math.round(score/shots*100)+'%':'&#8212;';
}
function renderHistogram(){
  const cfg=MODES[mode]; const total=shots||1;
  const relevant=cfg.outcomes.filter(o=>cfg.probs[cfg.outcomes.indexOf(o)]>0||counts[o]);
  const colors=['var(--accent)','var(--accent2)','var(--accent3)','#f0c040'];
  let html='';
  relevant.forEach((o,i)=>{
    const n=counts[o]||0; const pct=Math.round(n/total*100);
    const theoretical=Math.round((cfg.probs[cfg.outcomes.indexOf(o)]||0)*100);
    html+=`<div class="bar-row"><div class="bar-meta"><span>|${o}&#x27E9; <span style="color:var(--muted);font-size:0.65rem">theory ${theoretical}%</span></span><span>${n} shots (${pct}%)</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${colors[i%colors.length]}"></div></div></div>`;
  });
  document.getElementById('histogram').innerHTML=html||'<div style="font-family:var(--mono);font-size:0.75rem;color:var(--muted)">no shots yet</div>';
}
function addLog(result,predicted,hit,n){
  const log=document.getElementById('log');
  const el=document.createElement('div');
  el.className='log-entry '+(hit?'hit':'miss');
  el.textContent=`#${String(n).padStart(3,' ')}  measured |${result}\u27E9  predicted |${predicted}\u27E9  ${hit?'HIT':'MISS'}`;
  log.prepend(el);
}
function drawConvergence(){
  const canvas=document.getElementById('conv-canvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#12121a';
  ctx.beginPath(); ctx.rect(0,0,W,H); ctx.fill();
  ctx.strokeStyle='rgba(140,120,255,0.25)'; ctx.setLineDash([4,4]); ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,H/2); ctx.lineTo(W,H/2); ctx.stroke();
  ctx.setLineDash([]);
  if(history.length<2)return;
  ctx.strokeStyle='#3de8c8'; ctx.lineWidth=2; ctx.lineJoin='round';
  ctx.beginPath();
  history.forEach((p,i)=>{
    const x=(i/(history.length-1))*W; const y=(1-p)*H;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();
  history.forEach((p,i)=>{
    const x=(i/(history.length-1))*W; const y=(1-p)*H;
    ctx.beginPath(); ctx.arc(x,y,2.5,0,Math.PI*2);
    ctx.fillStyle='#3de8c8'; ctx.fill();
  });
  ctx.fillStyle='rgba(122,117,158,0.8)'; ctx.font='10px Space Mono,monospace';
  ctx.fillText('0.0',4,H-4); ctx.fillText('0.5',4,H/2-3); ctx.fillText('1.0',4,12);
}
setMode('super');
</script>
</body></html>
